<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>X Comment Blocker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="header">
      <div>
        <div class="title-row">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="currentColor"
            style="
              color: var(--text);
              flex-shrink: 0;
              transform: translateY(1.6px);
              margin-left: -1px;
              margin-right: -2px;
            "
          >
            <path
              d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
            ></path>
          </svg>
          <h3>内容过滤器</h3>
        </div>
        <p>评论区屏蔽管理系统</p>
      </div>
      <div class="header-actions">
        <a
          href="https://github.com/ethanzhou-dev/x-comment-blocker"
          target="_blank"
          class="icon-btn"
          title="GitHub 源码"
        >
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
            ></path>
          </svg>
        </a>
        <label class="toggle-switch" title="总开关">
          <input type="checkbox" id="enableToggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="stats-bar">
      <span class="stats-text"
        >已屏蔽
        <span class="stats-number" id="blockedCount">0</span> 条评论</span
      >
      <div class="stats-actions">
        <button class="btn-outline" id="viewHistory" title="查看历史记录">
          查看
        </button>
        <button class="btn-outline btn-danger" id="resetCount" title="清零">
          重置
        </button>
      </div>
    </div>

    <div class="control-group">
      <label
        for="cloudToggle"
        style="display: flex; align-items: center; gap: 8px"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"
          ></path>
          <path d="M12 12v9"></path>
          <path d="m8 17 4 4 4-4"></path>
        </svg>
        云端词库
      </label>
      <span class="cloud-info" id="cloudInfo"></span>
      <button class="icon-btn" id="sync-btn" title="同步云端词库">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <g class="spin-inner" style="transform-origin: 12px 12px">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </g>
        </svg>
      </button>
      <input type="checkbox" id="cloudToggle" />
    </div>

    <div class="section-user">
      <div class="section-header">
        <span
          class="section-label"
          style="display: flex; align-items: center; gap: 4px"
        >
          <svg
            width="11"
            height="11"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"
            ></path>
          </svg>
          自定义词库
        </span>
        <div class="section-actions">
          <button class="icon-btn" id="importBtn" title="导入词库">
            <svg
              viewBox="0 0 24 24"
              width="14"
              height="14"
              stroke="currentColor"
              fill="none"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </button>
          <button class="icon-btn" id="exportBtn" title="导出词库">
            <svg
              viewBox="0 0 24 24"
              width="14"
              height="14"
              stroke="currentColor"
              fill="none"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </button>
          <input
            type="file"
            id="importFile"
            accept=".txt,.json"
            style="display: none"
          />
        </div>
      </div>

      <div class="keyword-input-row">
        <input type="text" id="newKeyword" placeholder="输入新的屏蔽词…" />
        <button class="btn-add-inside" id="addBtn" title="添加">
          <svg
            viewBox="0 0 24 24"
            width="16"
            height="16"
            stroke="currentColor"
            fill="none"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>

      <div class="keyword-list" id="keywordList">
        <div class="empty-hint">暂无自定义屏蔽词</div>
      </div>
      <div class="keyword-count" id="keywordCount"></div>
    </div>

    <div class="settings-panel">
      <div class="settings-header" id="settingsHeader">
        <span class="settings-title">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
            ></path>
          </svg>
          高级设置
        </span>
        <span class="settings-arrow" id="settingsArrow">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </span>
      </div>
      <div class="settings-content" id="settingsContent">
        <div class="control-group">
          <label for="checkUsername">同时过滤用户名</label>
          <input type="checkbox" id="checkUsername" />
        </div>

        <div class="control-group">
          <label for="onlyComments">仅对评论区应用过滤</label>
          <input type="checkbox" id="onlyComments" checked />
        </div>

        <div class="control-group">
          <label for="blockSpecialChars">屏蔽特殊字符</label>
          <input type="checkbox" id="blockSpecialChars" checked />
        </div>

        <div class="control-group">
          <label for="blockEmoji">屏蔽所有带emoji的评论</label>
          <input type="checkbox" id="blockEmoji" />
        </div>
      </div>
    </div>

    <div class="history-modal" id="historyModal">
      <div class="history-header">
        <div style="display: flex; align-items: baseline; gap: 4px;">
          <span>屏蔽历史</span>
          <span class="history-subtitle">(最近100条)</span>
        </div>
        <button class="icon-btn history-close" id="closeHistory" title="关闭">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div id="status">已自动保存</div>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
